<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Наталья Воробьева — Коммерческая недвижимость</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
  :root {
    --bg-color: #121212;
    --card-bg: #1e1e1e;
    --accent-color: #c5a880;
    --text-main: #ffffff;
    --text-muted: #aaaaaa;
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: 'Segoe UI', sans-serif;
  }

  body {
    background-color: var(--bg-color);
    color: var(--text-main);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 20px;
  }

  .card {
    background: var(--card-bg);
    border: 1px solid #333;
    border-radius: 16px;
    padding: 40px 30px;
    width: 100%;
    max-width: 450px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
  }

  .avatar-photo {
    width: 110px;
    height: 110px;
    object-fit: cover;
    object-position: top center;
    border-radius: 50%;
    margin: 0 auto 25px;
    display: block;
    border: 2px solid var(--accent-color);
  }

  h1 {
    font-size: 2.2rem;
    font-weight: 700;
    margin-bottom: 8px;
  }

  .subtitle {
    font-size: 1.1rem;
    color: var(--accent-color);
    text-transform: uppercase;
    font-weight: 600;
    letter-spacing: 1px;
    margin-bottom: 25px;
  }

  .info-section {
    background: #252525;
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 30px;
    text-align: left;
  }

  .info-item {
    display: flex;
    align-items: flex-start;
    margin-bottom: 15px;
  }

  .info-item:last-child {
    margin-bottom: 0;
  }

  .info-item i {
    color: var(--accent-color);
    font-size: 1.2rem;
    margin-right: 15px;
    margin-top: 3px;
    width: 20px;
    text-align: center;
  }

  .info-text p {
    font-size: 0.95rem;
    color: var(--text-muted);
    line-height: 1.4;
  }

  .info-text strong {
    color: var(--text-main);
    display: block;
    margin-bottom: 2px;
  }

  .contact-buttons {
    display: flex;
    flex-direction: row;
    justify-content: center;
    gap: 14px;
  }

  .contact-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  .contact-label {
    font-size: 0.8rem;
    color: var(--text-muted);
    font-weight: 600;
    letter-spacing: 0.5px;
  }

  .btn-contact {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 64px;
    height: 64px;
    background-color: var(--accent-color);
    color: var(--bg-color);
    text-decoration: none;
    border-radius: 14px;
    font-size: 1.6rem;
    transition: all 0.2s;
    box-shadow: 0 0 10px rgba(197, 168, 128, 0.6), 0 0 22px rgba(197, 168, 128, 0.35);
  }

  .btn-contact:hover {
    transform: scale(1.08);
    box-shadow: 0 0 16px rgba(197, 168, 128, 0.9), 0 0 32px rgba(197, 168, 128, 0.55);
  }

  .btn-vcard {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    margin-top: 25px;
    background-color: var(--accent-color);
    color: var(--bg-color);
    border: none;
    text-decoration: none;
    padding: 15px;
    border-radius: 12px;
    font-weight: 600;
    font-size: 1.05rem;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 0 10px rgba(197, 168, 128, 0.6), 0 0 22px rgba(197, 168, 128, 0.35);
  }

  .btn-vcard i {
    margin-right: 10px;
    font-size: 1.2rem;
  }

  .btn-vcard:hover {
    transform: scale(1.02);
    box-shadow: 0 0 16px rgba(197, 168, 128, 0.9), 0 0 32px rgba(197, 168, 128, 0.55);
  }

  .save-panel {
    margin-top: 30px;
    text-align: center;
  }

  .btn-save {
    background: #333;
    color: #fff;
    border: 1px solid #555;
    padding: 10px 20px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.9rem;
  }

  .btn-save:hover {
    background: #444;
  }
</style>
</head>
